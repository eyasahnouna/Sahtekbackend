spring.application.name=sahtek

# Firebase - fichier Ã  placer dans src/main/resources/
firebase.service-account=firebase-service-account.json

# Port identique Ã  AiService Flutter (http://192.168.x.x:5080)
server.port=${PORT:5080}

# Limite taille des requÃªtes HTTP (image base64 â‰ˆ 5 Mo)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
server.tomcat.max-http-form-post-size=6MB

# Masquer les dÃ©tails d'erreur en production
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Email via Brevo HTTP API (app.brevo.com) — SMTP bloqué par Render
# Variables à définir dans le dashboard Render (sync: false)
brevo.api.key=${BREVO_API_KEY:}
brevo.from.email=${BREVO_FROM_EMAIL:}
brevo.from.name=Sahtek App

# Google Gemini Vision API
# Obtenir une clÃ© sur https://aistudio.google.com/app/apikey
gemini.api.key=${GEMINI_API_KEY}
gemini.api.model=gemini-2.0-flash

# Timeouts HTTP pour les appels Gemini (en millisecondes)
gemini.http.connect-timeout=15000
gemini.http.read-timeout=85000

spring.application.name=sahtek

# Firebase - fichier à placer dans src/main/resources/
firebase.service-account=firebase-service-account.json

# Port identique à AiService Flutter (http://192.168.x.x:5080)
server.port=5080

# Limite taille des requêtes HTTP (image base64 ≈ 5 Mo)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
server.tomcat.max-http-form-post-size=6MB

# Masquer les détails d'erreur en production
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Google Gemini Vision API
# Obtenir une clé sur https://aistudio.google.com/app/apikey
gemini.api.key=${GEMINI_API_KEY}
gemini.api.model=gemini-2.0-flash

# Timeouts HTTP pour les appels Gemini (en millisecondes)
gemini.http.connect-timeout=10000
gemini.http.read-timeout=60000
